    <style>
      /* Reset agressivo para evitar o flash branco e garantir o fundo preto */
      :root {
        --bg-deep: #050505;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg-deep);
        color: #ffffff;
        font-family: 'Poppins', sans-serif;
        overflow-x: hidden;
      }

      /* Loader simples para a tela não ficar morta enquanto o React monta */
      #root:empty {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-deep);
      }

      #root:empty::after {
        content: "";
        width: 40px;
        height: 40px;
        border: 4px solid #1a1a1a;
        border-top-color: #ffcc00;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

  </body>
