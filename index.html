<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    
    <title>SHITO PROJECT | Fragmentos de Alma</title>
    <meta name="description" content="O santuário definitivo para leitura de mangás. Explore fragmentos e vozes." />
    <meta name="theme-color" content="#ffcc00" />

    <link 
      rel="stylesheet" 
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" 
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" 
      crossorigin="anonymous" 
      referrerpolicy="no-referrer" 
    />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">

    <style>
      /* Reset agressivo para evitar o flash branco e garantir o fundo preto */
      :root {
        --bg-deep: #050505;
      }
      
      html, body {
        margin: 0;
        padding: 0;
        background-color: var(--bg-deep);
        color: #ffffff;
        font-family: 'Poppins', sans-serif;
        overflow-x: hidden;
      }

      /* Loader simples para a tela não ficar morta enquanto o React monta */
      #root:empty {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-deep);
      }

      #root:empty::after {
        content: "";
        width: 40px;
        height: 40px;
        border: 4px solid #1a1a1a;
        border-top-color: #ffcc00;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
